<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brisas de Gloria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; min-height: 100vh; }
    .portada-container { position: relative; width: 100vw; height: 100vh; }
    .portada-img { width: 100%; height: 100%; object-fit: cover; }
    .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.0) 50%, rgba(0,0,0,0.5) 100%); }
    .texto-inferior { position: absolute; bottom: 60px; left: 0; right: 0; text-align: center; }
    .btn-jugar { display: inline-block; background: linear-gradient(135deg, #FFD700, #B8860B); color: #000; font-size: 20px; font-weight: bold; padding: 16px 56px; border-radius: 50px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; animation: pulsar 2s infinite ease-in-out; }
    @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  </style>
</head>
<body>
  <div class="portada-container">
    <img class="portada-img" src="assets/PORTADA.jpeg" alt="Brisas de Gloria">
    <div class="overlay"></div>
    <div class="texto-inferior">
      <a href="juego.html" class="btn-jugar">▶ Jugar Ahora</a>
    </div>
  </div>
</body>
</html>
